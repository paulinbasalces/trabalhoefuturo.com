<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Curadoria | Ferramentas e Atalhos</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <header class="cabecalho-site">
        <div class="container nav-bar">
            <h1 class="logotipo" onclick="fecharTodosModais()">Portal<span>Curadoria</span></h1>
        </div>
    </header>

    <main class="container" id="conteudo-principal">
        <section class="hero">
            <h2>Escolha sua jornada</h2>
            <p>Selecione uma categoria abaixo para explorar ferramentas e conteúdos.</p>
        </section>

        <div id="grid-categorias-home" class="grid-cards"></div>
    </main>

    <div id="modal-overlay" class="modal-overlay hidden" onclick="fecharAoClicarFora(event)">
        
        <div id="modal-categoria" class="modal-content hidden">
            <button class="btn-fechar" onclick="fecharTodosModais()">✕</button>
            
            <div class="modal-header">
                <span id="cat-emoji" class="emoji-gigante"></span>
                <h2 id="cat-titulo"></h2>
            </div>

            <div class="area-adsense ads-modal">
                <p class="ads-label">Publicidade (AdSense Topo)</p>
            </div>

            <div id="grid-ferramentas-modal" class="grid-cards">
                </div>
        </div>

        <div id="modal-ferramenta" class="modal-content hidden">
            <button class="btn-voltar" onclick="voltarParaCategoria()">← Voltar</button>
            <button class="btn-fechar" onclick="fecharTodosModais()">✕</button>
            
            <div class="modal-header">
                <span id="artigo-emoji" class="emoji-gigante"></span>
                <h2 id="artigo-titulo"></h2>
                <span id="artigo-categoria" class="tag-categoria"></span>
            </div>

            <div class="dor-box">
                <strong>💡 Resolve:</strong>
                <p id="artigo-dor"></p>
            </div>

            <div class="artigo-corpo">
                <p id="artigo-descricao"></p>
            </div>

            <div class="area-adsense ads-modal">
                <p class="ads-label">Publicidade (AdSense Conversão)</p>
            </div>

            <div class="artigo-acao">
                <a id="artigo-link" href="#" target="_blank" rel="noopener noreferrer" class="btn-primario">Acessar Plataforma Oficial</a>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
